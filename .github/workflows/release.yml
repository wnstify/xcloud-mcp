# Release: tag-gated npm publish with provenance via OIDC trusted publishing.
#
# Verified releases the npm-native way — no hand-rolled cosign/Ed25519/SBOM.
# `npm publish` under a GitHub Actions OIDC identity automatically mints a SLSA
# provenance attestation (Sigstore-signed, recorded in Rekor) and surfaces the
# "provenance" badge on the npm package page. Consumers verify with
# `npm audit signatures`.
#
# Requirement: `id-token: write` — the OIDC token that signs the SLSA provenance.
#
# BOOTSTRAP (current): the first release publishes with the NPM_TOKEN secret plus
# `--provenance`, because a trusted publisher cannot be configured until the package
# exists on npm. Provenance is still full and verifiable — SLSA in-toto statement,
# Sigstore keyless signature, Rekor transparency-log entry, "provenance" badge on
# the package page — verified by consumers with `npm audit signatures`. An SPDX
# SBOM is also generated and attested against the tarball (verify with
# `gh attestation verify <tarball>`).
#
# AFTER v1.0.1 is live: configure the trusted publisher (npmjs.com -> package
# Settings -> Trusted Publisher -> GitHub Actions; repo = wnstify/xcloud-mcp,
# workflow = release.yml), then remove NODE_AUTH_TOKEN and delete the NPM_TOKEN
# secret to publish tokenless (provenance stays automatic under OIDC).
#
# Publishing is tag-only: a real publish happens only on a `refs/tags/v*` push
# to the canonical public repo. Do NOT broaden the trigger to branches or PRs.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only the canonical public repo may publish; forks and mirrors are inert.
    if: github.repository == 'wnstify/xcloud-mcp'
    permissions:
      contents: read
      id-token: write # OIDC token that signs the provenance and SBOM attestations
      attestations: write # store the SBOM attestation bound to the published tarball
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Node 24 ships npm 11.3.x; trusted publishing needs >= 11.5.1.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Assert the tag matches package.json version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi
          echo "version OK: v$pkg"

      - run: npm ci

      # Full gate — a single failure stops the release. `npm test` enforces the
      # 80% coverage floor (same as CI) and runs the pretest `npm audit` gate.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

      - run: npm run build

      # Pack the exact tarball we publish, so the SBOM attestation and the npm
      # provenance both bind to the same bytes.
      - name: Pack the release tarball
        id: pack
        run: |
          TARBALL=$(npm pack)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Generate SPDX SBOM
        run: npm sbom --sbom-format spdx --sbom-type application > sbom.spdx.json

      - name: Attest the SBOM against the tarball
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          sbom-path: sbom.spdx.json

      # Publish the packed tarball with SLSA provenance (in-toto statement,
      # Sigstore-signed, Rekor-logged). Bootstrap uses the NPM_TOKEN secret;
      # --provenance is explicit because we are token-authed. Once trusted
      # publishing is configured, drop the env + flag and publish tokenless.
      - name: Publish to npm with provenance
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
