name: Feature request
description: Suggest an improvement or a new capability for xcloud-mcp.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        xcloud-mcp exposes a curated set of MCP tools over the xCloud API rather than a
        raw passthrough of every endpoint. If you are requesting a new tool, please
        explain the use case and why it belongs in the curated set.

        **Do not include secrets, tokens, passwords, or unredacted `.env` contents.**
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request contains no secrets, tokens, or credentials.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve? What is the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or capability you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative approaches you have considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context that would help us understand the request.
    validations:
      required: false
